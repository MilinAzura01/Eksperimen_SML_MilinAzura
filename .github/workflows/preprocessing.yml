name: Preprocessing Pipeline - Titanic

on:
  push:
    branches: [main, master]
    paths:
      - 'titanic_raw/**'
      - 'preprocessing/automate_MilinAzura.py'
  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run Preprocessing
        run: |
          python preprocessing/automate_MilinAzura.py \
            titanic_raw/Titanic-Dataset.csv \
            preprocessing/titanic_preprocessing

      - name: Commit and Push Preprocessed Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/titanic_preprocessing/
          git diff --staged --quiet || git commit -m "chore: update preprocessed dataset [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
